<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#4F46E5"/>
  <g transform="translate(256,256)">
    <!-- Shopping bag body -->
    <rect x="-120" y="-60" width="240" height="200" rx="20" fill="none" stroke="white" stroke-width="28"/>
    <!-- Bag handles -->
    <path d="M-60,-60 C-60,-120 60,-120 60,-60" fill="none" stroke="white" stroke-width="28" stroke-linecap="round"/>
    <!-- Checkmark -->
    <polyline points="-40,40 -10,70 50,10" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
